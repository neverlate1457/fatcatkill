services:
  backend:
    build:
      context: ./fatcatkill-api
    container_name: fatcatkill-backend
    restart: unless-stopped
    expose:
      - "${BACKEND_CONTAINER_PORT}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BACKEND_PORT: ${BACKEND_CONTAINER_PORT}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_DOCKER_URL}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      ENABLE_DEBUG_ACTIONS: ${ENABLE_DEBUG_ACTIONS}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/${BACKEND_CONTAINER_PORT}'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    security_opt:
      - no-new-privileges:true

  gateway:
    build:
      context: ./fatcatkill-gateway
    container_name: fatcatkill-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_CONTAINER_PORT}"
    environment:
      PORT: ${GATEWAY_CONTAINER_PORT}
      SPRING_BOOT_URL: ${GATEWAY_BACKEND_DOCKER_URL}
      ENABLE_DEBUG_ACTIONS: ${ENABLE_DEBUG_ACTIONS}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./fatcatkill-web
      args:
        VITE_GATEWAY_URL: ${VITE_GATEWAY_URL}
        VITE_ENABLE_DEBUG_MODE: ${VITE_ENABLE_DEBUG_MODE}
    container_name: fatcatkill-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - gateway
    security_opt:
      - no-new-privileges:true
