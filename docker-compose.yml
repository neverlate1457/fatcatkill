services:
  backend:
    build:
      context: ./fatcatkill-api
    container_name: fatcatkill-api
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_DOCKER_URL}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      ENABLE_DEBUG_ACTIONS: ${ENABLE_DEBUG_ACTIONS:-false}
      BACKEND_PORT: ${BACKEND_CONTAINER_PORT:-8080}
      BACKEND_BIND_ADDRESS: 0.0.0.0
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    expose:
      - "${BACKEND_CONTAINER_PORT:-8080}"

  gateway:
    build:
      context: ./fatcatkill-gateway
    container_name: fatcatkill-gateway
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: ${GATEWAY_CONTAINER_PORT:-3000}
      GATEWAY_PORT: ${GATEWAY_CONTAINER_PORT:-3000}
      SPRING_BOOT_URL: ${GATEWAY_BACKEND_DOCKER_URL:-http://backend:8080/api}
      GATEWAY_BACKEND_URL: ${GATEWAY_BACKEND_DOCKER_URL:-http://backend:8080/api}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENABLE_DEBUG_ACTIONS: ${ENABLE_DEBUG_ACTIONS:-false}
    ports:
      - "${GATEWAY_PORT:-8091}:${GATEWAY_CONTAINER_PORT:-3000}"

  frontend:
    build:
      context: ./fatcatkill-web
      args:
        VITE_GATEWAY_URL: ${VITE_GATEWAY_URL:-}
        VITE_ENABLE_DEBUG_MODE: ${VITE_ENABLE_DEBUG_MODE:-false}
    container_name: fatcatkill-web
    restart: unless-stopped
    depends_on:
      - gateway
    environment:
      GATEWAY_CONTAINER_PORT: ${GATEWAY_CONTAINER_PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
