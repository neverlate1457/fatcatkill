debug: false
spring:
  config:
    import: ""
  datasource:
    url: jdbc:h2:mem:fatcatkill;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false

fatcatkill:
  debug-actions: true
logging:
  level:
    root: warn
    org.springframework: warn
    com.fatcatkill: info
    org.springframework.test.context: warn
    org.hibernate.SQL: warn
